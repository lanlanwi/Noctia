<script>
(function () {
  let stage = 0;
  function load(src) {
    const s = document.createElement("script");
    s.src = src;
    s.defer = true;
    s.onerror = () => {
      s.remove();
      if (stage === 0) {
        stage = 1;
        load("../noctia.js");
      }
    }
    document.head.appendChild(s);
  }
  load("https://cdn.jsdelivr.net/gh/lanlanwi/noctia@1.0.0/noctia.js");
})();
</script>

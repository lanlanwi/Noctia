  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lanlanwi/noctia@v2.0.0/dist/src/css/noctia.src.css" id="cdn">

  <script>
    (function () {
      const cdn = document.getElementById('cdn');
      const local = document.getElementById('local');
      cdn.onload = () => local.remove();
      cdn.onerror = () => cdn.remove();

      let stage = 0;
      function load(src) {
        const s = document.createElement("script");
        s.src = src;
        s.onerror = () => {
          s.remove();
          if (stage === 0) {
            stage = 1;
            load("../dist/src/js/noctia.src.js");
          }
        }
        document.head.appendChild(s);
      }
      load("https://cdn.jsdelivr.net/gh/lanlanwi/noctia@v2.0.0/dist/js/noctia.js");
    })();
  </script>
